    <style>
        :root{--coral:#E8668B;--coral-light:#F2A0B5;--coral-dark:#C44D6E;--navy:#1A1A2E;--navy-light:#2A2A45;--cream:#FAF7F2;--cream-dark:#F0EBE1;--stone:#8C8279;--stone-light:#B5ADA5;--white:#FFFFFF;--sand:#E8DDD0;--green:#25D366;--shadow-sm:0 2px 8px rgba(0,0,0,0.06);--shadow-md:0 8px 30px rgba(0,0,0,0.1);--shadow-lg:0 20px 60px rgba(0,0,0,0.15);--r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:24px}
        *{margin:0;padding:0;box-sizing:border-box}
        .plv-panel,.plv-panel *{box-sizing:border-box}
        .plv-panel a{color:var(--coral);text-decoration:none}
        .plv-panel a:hover{text-decoration:underline}

        /* FAB */
        .plv-fab{position:fixed;bottom:24px;right:24px;width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;z-index:9998;background:var(--navy);box-shadow:var(--shadow-lg),0 0 0 0 rgba(232,102,139,0.4);display:flex;align-items:center;justify-content:center;transition:all .4s cubic-bezier(.34,1.56,.64,1);animation:fp 3s ease-in-out infinite}

        .plv-fab.is-open svg{transform:rotate(90deg)}.plv-fab.is-open{animation:none}
        @keyframes fp{0%,100%{box-shadow:var(--shadow-lg),0 0 0 0 rgba(232,102,139,0.3)}50%{box-shadow:var(--shadow-lg),0 0 0 12px rgba(232,102,139,0)}}

        /* PANEL */
        .plv-panel{position:fixed;bottom:100px;right:24px;width:min(440px,calc(100vw - 32px));height:min(720px,calc(100vh - 130px));background:var(--cream);border-radius:var(--r-xl);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;z-index:9999;opacity:0;transform:translateY(24px) scale(.96);pointer-events:none;transition:all .45s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(232,102,139,0.12)}
        .plv-panel.is-visible{opacity:1;transform:translateY(0) scale(1);pointer-events:all}

        /* HEAD */
        .ch{background:var(--navy);flex-shrink:0;position:relative;overflow:hidden}
        .ch::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--coral),transparent)}
        .ht{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px}
        .hb{display:flex;align-items:center;gap:14px}
        .hlogo{height:32px;width:auto;opacity:.95}
        .hd{width:1px;height:24px;background:rgba(255,255,255,0.12)}
        .hti{display:flex;flex-direction:column;gap:2px}
        .hti h3{font-size:14px;font-weight:500;color:var(--cream);letter-spacing:.02em}
        .hs{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--stone-light)}
        .hsp{width:6px;height:6px;background:#4ADE80;border-radius:50%;position:relative}
        .hsp::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:rgba(74,222,128,0.3);animation:sr 2s ease-in-out infinite}
        @keyframes sr{0%,100%{transform:scale(.8);opacity:1}50%{transform:scale(1.4);opacity:0}}
        .hx{background:rgba(255,255,255,0.08);border:none;color:var(--stone-light);width:32px;height:32px;border-radius:var(--r-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:18px}
        .hx:hover{background:rgba(255,255,255,0.15)!important;color:var(--cream)}
        .ls{display:flex;padding:0 18px 14px}
        .lp{flex:1;padding:7px 0;background:0;border:1px solid rgba(232,102,139,0.25);color:var(--stone-light);font-size:11px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .25s;letter-spacing:.06em;text-transform:uppercase}

        /* MESSAGES */

        .msg.ib .ma{background:var(--navy);color:var(--coral)}.msg.iu .ma{background:var(--sand);color:var(--stone)}

        .mx{max-width:100%;width:fit-content;padding:12px 16px;font-size:13.5px;line-height:1.6;word-wrap:break-word;overflow-wrap:break-word}
        .msg.ib .mx{background:var(--white);color:var(--navy);border-radius:2px 14px 14px 14px;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,0.04)}
        .msg.iu .mx{background:var(--navy);color:var(--cream);border-radius:14px 2px 14px 14px;margin-left:auto}
        .qr{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
        .qb{background:var(--white);border:1.5px solid var(--sand);color:var(--navy);padding:8px 16px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif;white-space:nowrap}
        .qb:hover{background:var(--navy)!important;border-color:var(--navy)!important;color:var(--coral)!important;transform:translateY(-1px);box-shadow:var(--shadow-sm)}

        /* PROPERTY CARDS */
        .pc{background:var(--white);border-radius:var(--r-md);overflow:hidden;margin-top:10px;box-shadow:var(--shadow-md);border:1px solid rgba(0,0,0,0.04);transition:transform .3s,box-shadow .3s;cursor:pointer}
        .pc:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
        .pci{position:relative;width:100%;height:160px;overflow:hidden;background:linear-gradient(135deg,var(--navy),var(--navy-light))}
        .pci-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
        .pci-placeholder svg{width:36px;height:36px;stroke:var(--coral);fill:none;stroke-width:1.2}
        .pci-placeholder span{color:var(--coral);font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic}
        .pci img{width:100%;height:100%;object-fit:cover;transition:transform .5s}.pc:hover .pci img{transform:scale(1.05)}
        .pcb{position:absolute;top:12px;left:12px;background:rgba(26,26,46,0.88);color:var(--coral);padding:4px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;backdrop-filter:blur(8px)}
        .pcn{padding:14px 16px}
        .pcn h4{font-size:16px;color:var(--navy);margin-bottom:6px}
        .pcm{display:flex;gap:10px;font-size:12px;color:var(--stone);margin-bottom:8px;flex-wrap:wrap}
        .pcm span{display:flex;align-items:center;gap:3px}
        .pcm svg{width:12px;height:12px;stroke:var(--coral);fill:none;stroke-width:2}
        .pcp{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--coral-dark)}
        .pcd{font-size:12px;color:var(--stone);line-height:1.5;margin-top:6px}

        /* DETAIL VIEW */
        .dtl{background:var(--white);border-radius:var(--r-md);overflow:hidden;margin-top:10px;box-shadow:var(--shadow-md)}
        .dtl-head{background:var(--navy);padding:16px;color:var(--cream)}
        .dtl-head h4{font-size:18px;color:var(--coral-light);margin-bottom:4px}
        .dtl-head span{font-size:12px;color:var(--stone-light)}
        .dtl-body{padding:16px}
        .dtl-specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
        .dtl-spec{background:var(--cream);border-radius:8px;padding:10px;text-align:center}
        .dtl-spec .val{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--navy)}
        .dtl-spec .lbl{font-size:10px;color:var(--stone);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
        .dtl-amen{font-size:12px;color:var(--stone);line-height:1.7;margin-bottom:14px}
        .dtl-amen strong{color:var(--navy)}
        .dtl-cta{width:100%;padding:12px;background:var(--coral);color:var(--white);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;transition:all .25s}
        .dtl-cta:hover{background:var(--coral-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}

        /* FORM */
        .qf{background:var(--white);border-radius:var(--r-md);padding:20px;margin-top:10px;box-shadow:var(--shadow-md);border:1px solid rgba(0,0,0,0.04)}
        .qf h4{font-size:17px;color:var(--navy);margin-bottom:4px}
        .qfs{font-size:12px;color:var(--stone);margin-bottom:16px}
        .fg{margin-bottom:14px}
        .fg label{display:block;font-size:11px;font-weight:600;color:var(--stone);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
        .fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1.5px solid var(--sand);border-radius:var(--r-sm);font-size:13px;font-family:'DM Sans',sans-serif;color:var(--navy);outline:0;background:var(--cream);transition:all .2s}
        .fg textarea{resize:vertical;min-height:60px}
        .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--coral);background:var(--white);box-shadow:0 0 0 3px rgba(232,102,139,0.1)}
        .fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .qc{width:100%;padding:13px;background:var(--navy);color:var(--coral);border:none;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.04em;text-transform:uppercase;transition:all .25s;margin-top:4px}
        .qc:hover{background:var(--coral);color:var(--white);transform:translateY(-1px);box-shadow:var(--shadow-md)}

        /* CONTACT CARD */

        .ccrd h4{color:var(--coral-light);margin-bottom:12px}
        .ccrd-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.06)}
        .ccrd-row:last-child{border:none}
        .ccrd-row svg{width:16px;height:16px;stroke:var(--coral);fill:none;stroke-width:2;flex-shrink:0}
        .ccrd-row a{color:var(--coral-light);text-decoration:none}
        .ccrd-row a:hover{text-decoration:underline}

        .send-btns{display:flex;gap:8px;margin-top:12px}
        .sbtn{flex:1;padding:11px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-align:center;text-decoration:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;border:none;color:white}
        .sbtn-wa{background:var(--green)}.sbtn-wa:hover{background:#1DA851}
        .sbtn-em{background:var(--navy);color:var(--coral)}.sbtn-em:hover{background:var(--coral);color:white}

        /* INPUT */
        .ci{flex-shrink:0;padding:12px 16px;background:var(--white);border-top:1px solid var(--cream-dark);display:flex;gap:8px;align-items:center}
        .ci input{flex:1;padding:10px 16px;border:1.5px solid var(--sand);border-radius:20px;font-size:13px;font-family:'DM Sans',sans-serif;outline:0;background:var(--cream);color:var(--navy);transition:all .2s}
        .ci input:focus{border-color:var(--coral);background:var(--white)}
        .ci button{width:40px;height:40px;border-radius:50%;background:var(--navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
        .ci button:hover{background:var(--coral)}
        .ci button svg{width:18px;height:18px;fill:none;stroke:var(--coral);stroke-width:2}
        .ci button:hover svg{stroke:var(--white)}

        /* FOOTER */
        .cf{text-align:center;padding:8px;font-size:10px;color:var(--stone-light);background:var(--white);border-top:1px solid var(--cream-dark);flex-shrink:0}
        .cf a{color:var(--coral);text-decoration:none}

        /* TYPING */
        .typing{display:flex;gap:4px;padding:12px 16px}.typing span{width:6px;height:6px;background:var(--stone-light);border-radius:50%;animation:tb 1.2s infinite}
        .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
        @keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

        /* MOBILE */
        @media(max-width:768px){.plv-panel{width:calc(100vw - 16px);height:calc(100dvh - 100px);max-height:600px;right:8px;bottom:76px;border-radius:var(--r-lg)}.plv-fab{right:16px;bottom:16px;width:56px;height:56px}.pci{height:130px}}
        @media(max-width:430px){.plv-panel{width:calc(100vw - 12px);height:calc(100dvh - 90px);max-height:580px;right:6px;bottom:72px;border-radius:var(--r-md)}.plv-fab{right:12px;bottom:12px;width:52px;height:52px}.mx{font-size:12.5px;padding:10px 13px}.qb{font-size:11px;padding:7px 12px}.pci{height:110px}}
    </style>
</head>

const tx = k => TX[S.lang][k];

// ============ DOM ============
const fab=$('chatFab'),panel=$('chatPanel'),body=$('chatBody'),inp=$('chatInput'),sbtn=$('sendBtn');
fab.onclick=()=>tog();$('closeBtn').onclick=()=>tog(false);sbtn.onclick=()=>send();
inp.onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}};
document.querySelectorAll('.lp').forEach(b=>{b.onclick=()=>{const l=b.dataset.lang;if(l===S.lang)return;S.lang=l;document.querySelectorAll('.lp').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('stx').textContent=tx('st');inp.placeholder=tx('ph');body.innerHTML='';S.init=false;initChat();}});

function tog(f){const o=f!==undefined?f:!S.open;S.open=o;panel.classList.toggle('is-visible',o);fab.classList.toggle('is-open',o);if(o&&!S.init)setTimeout(initChat,350);if(o)setTimeout(()=>inp.focus(),400);}

// ============ UI HELPERS ============
function addMsg(h,bot,o={}){
    const m=document.createElement('div');m.className=`msg ${bot?'ib':'iu'}`;
    const a=document.createElement('div');a.className='ma';a.textContent=bot?'PLV':'●';
    const mb=document.createElement('div');mb.className='mb';
    const mx=document.createElement('div');mx.className='mx';mx.innerHTML=h.replace(/\n/g,'<br>');
    mb.appendChild(mx);
    if(o.qr?.length){const w=document.createElement('div');w.className='qr';o.qr.forEach(r=>{const b=document.createElement('button');b.className='qb';b.textContent=r;b.onclick=()=>handleQR(r);w.appendChild(b);});mb.appendChild(w);}
    m.appendChild(a);m.appendChild(mb);body.appendChild(m);body.scrollTop=body.scrollHeight;
}

function addCard(html){const m=document.createElement('div');m.className='msg ib';const a=document.createElement('div');a.className='ma';a.textContent='PLV';const mb=document.createElement('div');mb.className='mb';mb.innerHTML=html;m.appendChild(a);m.appendChild(mb);body.appendChild(m);body.scrollTop=body.scrollHeight;}

function showTyping(){const d=document.createElement('div');d.id='typing';d.className='msg ib';d.innerHTML=`<div class="ma">PLV</div><div class="mb"><div class="typing"><span></span><span></span><span></span></div></div>`;body.appendChild(d);body.scrollTop=body.scrollHeight;}
function hideTyping(){const t=$('typing');if(t)t.remove();}

// ============ INIT ============
function initChat(){S.init=true;addMsg(tx('hi'),true,{qr:tx('opts')});}

// ============ QR HANDLER ============
function handleQR(r){
    addMsg(r,false);
    const lo=r.toLowerCase();
    if(lo.includes('browse')||lo.includes('ver prop')||lo.includes('properties')||lo.includes('propiedades'))return showProperties();
    if(lo.includes('about')||lo.includes('sobre')||lo.includes('careyes'))return showAbout();
    if(lo.includes('contact')||lo.includes('contactar')||lo.includes('marco'))return showContact();
    if(lo.includes('request')||lo.includes('solicitar')||lo.includes('info')||lo.includes('interested')||lo.includes('interesado'))return showLeadForm();
    if(lo.includes('back')||lo.includes('volver')||lo.includes('menu')||lo.includes('menú'))return addMsg(tx('hi'),true,{qr:tx('opts')});
    processMsg(r);
}

function send(){const v=inp.value.trim();if(!v)return;inp.value='';addMsg(v,false);processMsg(v);}

// ============ PROPERTIES ============
function showProperties(){
    addMsg(L()?'Aquí están nuestras propiedades exclusivas en venta en Costa Careyes:':'Here are our exclusive properties for sale in Costa Careyes:',true);
    const props=PROPS[S.lang];
    props.forEach((p,i)=>{
        setTimeout(()=>{
            const imgHtml=p.img?`<img src="${p.img}" alt="${p.name}">`:`<div class="pci-placeholder"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>${p.name}</span></div>`;
            addCard(`<div class="pc" onclick="showDetail('${p.id}')">
                <div class="pci">${imgHtml}<div class="pcb">${p.badge}</div></div>
                <div class="pcn">
                    <h4>${p.name}</h4>
                    <div class="pcm">
                        <span><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>${p.size}</span>
                        ${p.beds!=='—'?`<span><svg viewBox="0 0 24 24"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>${p.beds}</span>`:''}
                    </div>
                    <div class="pcp">${p.price}</div>
                </div>
            </div>`);
        },i*300);
    });
    setTimeout(()=>{
        addMsg(L()?'¿Te interesa alguna propiedad? Haz clic en ella para ver los detalles completos, o solicita información directamente.':'Interested in any property? Click on it for full details, or request information directly.',true,{qr:L()?['Solicitar información','Contactar a Marco','Volver al menú']:['Request Info','Contact Marco','Back to Menu']});
    },props.length*300+500);
}

// ============ DETAIL ============
window.showDetail=function(id){
    const p=PROPS[S.lang].find(x=>x.id===id);if(!p)return;
    let amenHtml=p.amenities.map(a=>`· ${a}`).join('<br>');
    let videoHtml=p.video?`<div style="margin:10px 0"><a href="${p.video}" target="_blank" style="display:flex;align-items:center;gap:6px;color:var(--coral);font-size:12px;font-weight:600;text-decoration:none">▶ ${L()?'Ver video':'Watch video'}</a></div>`:'';
    
    addCard(`<div class="dtl">
        <div class="dtl-head"><h4>${p.name}</h4><span>${p.badge} · ${p.size}</span></div>
        <div class="dtl-body">
            <div class="dtl-specs">
                <div class="dtl-spec"><div class="val">${p.beds}</div><div class="lbl">${L()?'Recámaras':'Bedrooms'}</div></div>
                <div class="dtl-spec"><div class="val">${p.baths}</div><div class="lbl">${L()?'Baños':'Bathrooms'}</div></div>
            </div>
            <p style="font-size:13px;color:var(--navy);line-height:1.6;margin-bottom:12px">${p.desc}</p>
            <div class="dtl-amen"><strong>${L()?'Características':'Features'}:</strong><br>${amenHtml}</div>
            ${videoHtml}
            <div class="pcp" style="text-align:center;padding:10px 0;border-top:1px solid var(--cream-dark)">${p.price}</div>
            <button class="dtl-cta" onclick="showLeadForm('${p.name}')">${L()?'Solicitar Información':'Request Information'}</button>
        </div>
    </div>`);
};

// ============ LEAD FORM ============
window.showLeadForm=function(propName){
    const l=L();
    const propOptions=PROPS[S.lang].map(p=>`<option value="${p.name}" ${p.name===propName?'selected':''}>${p.name}</option>`).join('');
    addCard(`<div class="qf"><h4>${l?'Solicitar Información':'Request Information'}</h4><div class="qfs">${l?'Completa tus datos y Marco te contactará directamente':'Fill in your details and Marco will contact you directly'}</div>
        <div class="fr"><div class="fg"><label>${l?'Nombre':'Name'}</label><input type="text" id="lNm" placeholder="${l?'Tu nombre completo':'Your full name'}"></div><div class="fg"><label>Email</label><input type="email" id="lEm" placeholder="${l?'Tu email':'Your email'}"></div></div>
        <div class="fg"><label>${l?'Teléfono / WhatsApp':'Phone / WhatsApp'}</label><input type="tel" id="lPh" placeholder="+1..."></div>
        <div class="fg"><label>${l?'Propiedad de Interés':'Property of Interest'}</label><select id="lPr"><option value="">${l?'Selecciona...':'Select...'}</option>${propOptions}<option value="General">${l?'Información general':'General inquiry'}</option></select></div>
        <div class="fg"><label>${l?'Mensaje (opcional)':'Message (optional)'}</label><textarea id="lMs" placeholder="${l?'Cuéntanos qué buscas...':'Tell us what you\'re looking for...'}"></textarea></div>
        <button class="qc" onclick="sendLead()">${l?'Enviar Solicitud':'Send Request'}</button></div>`);
};

// ============ SEND LEAD ============
window.sendLead=function(){
    const l=L();
    const nm=$('lNm').value,em=$('lEm').value,ph=$('lPh')?.value||'',pr=$('lPr').value,ms=$('lMs')?.value||'';
    if(!nm||!em){alert(l?'Por favor completa nombre y email':'Please fill in name and email');return;}

    // Build text
    let txt=`REAL ESTATE INQUIRY — Pacific Luxury Villas\n${'='.repeat(40)}\n\n`;
    txt+=`Name: ${nm}\nEmail: ${em}\n${ph?'Phone: '+ph+'\n':''}`;
    txt+=`Property: ${pr||'General'}\nLanguage: ${l?'Spanish':'English'}\n`;
    if(ms)txt+=`Message: ${ms}\n`;
    txt+=`\n---\nGenerated by PLV Real Estate Assistant\npacificluxuryvillas.com · Powered by wdstudio.agency`;

    // WhatsApp link
    const waLink=`https://api.whatsapp.com/send?phone=${C.WA.replace('+','')}&text=${encodeURIComponent(txt)}`;

    // Send to Apps Script if configured
    if(C.APPS_SCRIPT){
        fetch(C.APPS_SCRIPT,{method:'POST',mode:'no-cors',body:JSON.stringify({
            type:'real_estate',name:nm,email:em,phone:ph,property:pr||'General',
            notes:ms,lang:S.lang,source:'PLV Bot'
        })}).catch(()=>{});
    }

    addMsg(l?`¡Gracias, ${nm}! Tu solicitud sobre <strong>${pr||'propiedades en Careyes'}</strong> ha sido enviada.\n\nMarco Lorelli, nuestro especialista en bienes raíces, te contactará pronto.\n\nTambién puedes comunicarte directamente:`:`Thank you, ${nm}! Your inquiry about <strong>${pr||'Careyes properties'}</strong> has been sent.\n\nMarco Lorelli, our real estate specialist, will contact you shortly.\n\nYou can also reach out directly:`,true);

    setTimeout(()=>{
        addCard(`<div class="send-btns">
            <a href="${waLink}" target="_blank" class="sbtn sbtn-wa">WhatsApp Marco</a>
            <a href="mailto:${C.EMAIL}?subject=${encodeURIComponent('Property Inquiry: '+(pr||'General')+' — '+nm)}&body=${encodeURIComponent(txt)}" class="sbtn sbtn-em">Send Email</a>
        </div>`);
    },300);

    setTimeout(()=>{
        addMsg(l?'¿Te gustaría ver más propiedades o tienes alguna pregunta?':'Would you like to see more properties or do you have any questions?',true,{qr:tx('opts')});
    },800);
};

// ============ ABOUT ============
function showAbout(){
    addMsg(L()?
        'Costa Careyes es un destino único en la costa del Pacífico de México donde el lujo, la naturaleza y la exclusividad se encuentran en perfecta armonía.\n\nUbicada entre Puerto Vallarta y Manzanillo, es una comunidad internacional que valora la belleza, la privacidad y la conexión con la naturaleza.\n\n<strong>Poseer una propiedad en Careyes es más que una inversión</strong> — es formar parte de una comunidad cosmopolita y vibrante.':
        'Costa Careyes is a one-of-a-kind destination on Mexico\'s Pacific Coast where luxury, nature, and exclusivity come together in perfect harmony.\n\nLocated between Puerto Vallarta and Manzanillo, it\'s an international community that values beauty, privacy, and a deep connection with nature.\n\n<strong>Owning a property in Careyes is more than an investment</strong> — it\'s becoming part of a vibrant, cosmopolitan community.',
    true,{qr:L()?['Ver Propiedades','Contactar a Marco']:['Browse Properties','Contact Marco']});
}

// ============ CONTACT ============
function showContact(){
    addCard(`<div class="ccrd"><h4>Marco Lorelli</h4><p style="font-size:12px;color:var(--stone-light);margin-bottom:12px">${L()?'Rentas / Bienes Raíces / Administración de Propiedades':'Rentals / Real Estate / Property Management'}</p>
        <div class="ccrd-row"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>+52 1 (322) 140 1809</span></div>
        <div class="ccrd-row"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg><span>+52 (315) 351 2042</span></div>
        <div class="ccrd-row"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg><a href="mailto:${C.EMAIL}">${C.EMAIL}</a></div>
        <div class="ccrd-row"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><a href="${C.WEB}" target="_blank">pacificluxuryvillas.com</a></div>
        <div class="ccrd-row"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg><a href="https://www.instagram.com/plvincareyes/" target="_blank">@plvincareyes</a></div>
    </div>`);
    setTimeout(()=>{
        addMsg(L()?'¿Te gustaría solicitar información sobre alguna propiedad?':'Would you like to request information about a property?',true,{qr:L()?['Ver Propiedades','Solicitar información','Volver al menú']:['Browse Properties','Request Info','Back to Menu']});
    },400);
}

// ============ MESSAGE ROUTER ============
function processMsg(msg){
    const lo=msg.toLowerCase();
    if(lo.includes('propiedad')||lo.includes('property')||lo.includes('properties')||lo.includes('propiedades')||lo.includes('venta')||lo.includes('sale')||lo.includes('buy')||lo.includes('comprar'))return showProperties();
    if(lo.includes('sol')&&(lo.includes('casita')||lo.includes('el sol'))){return window.showDetail('sol');}
    if(lo.includes('caracol')){return window.showDetail('caracol');}
    if(lo.includes('lote')||lo.includes('lot')||lo.includes('137')||lo.includes('terreno')||lo.includes('land')){return window.showDetail('lote137');}
    if(lo.includes('gloria')){return window.showDetail('glorias');}
    if(lo.includes('condo')||lo.includes('residenc')){return window.showDetail('condo');}
    if(lo.includes('contact')||lo.includes('contacto')||lo.includes('marco')||lo.includes('whatsapp')||lo.includes('phone')||lo.includes('teléfono'))return showContact();
    if(lo.includes('careyes')||lo.includes('about')||lo.includes('ubicaci')||lo.includes('location')||lo.includes('donde')||lo.includes('where'))return showAbout();
    if(lo.includes('info')||lo.includes('interested')||lo.includes('interesado')||lo.includes('request')||lo.includes('solicitar'))return showLeadForm();
    if(lo.includes('hola')||lo.includes('hello')||lo.includes('hi ')||lo==='hi'||lo.includes('hey')||lo.includes('buenos')){
        addMsg(L()?'¡Hola! Bienvenido a Pacific Luxury Villas Real Estate. ¿En qué puedo ayudarte?':'Hello! Welcome to Pacific Luxury Villas Real Estate. How can I help you?',true,{qr:tx('opts')});return;
    }
    if(lo.includes('gracias')||lo.includes('thank')){
        addMsg(L()?'¡Con gusto! ¿Hay algo más en lo que pueda ayudarte?':'My pleasure! Is there anything else I can help with?',true,{qr:tx('opts')});return;
    }
    if(lo.includes('precio')||lo.includes('price')||lo.includes('cost')||lo.includes('cuanto')||lo.includes('how much')){
        addMsg(L()?'Todas nuestras propiedades manejan precios bajo consulta. Solicita información y Marco te dará todos los detalles personalizados.':'All our properties are priced upon request. Submit an inquiry and Marco will provide you with all the personalized details.',true,{qr:L()?['Ver Propiedades','Solicitar información']:['Browse Properties','Request Info']});return;
    }
    // Default
    addMsg(L()?'Puedo ayudarte a explorar propiedades en Careyes. ¿Qué te gustaría hacer?':'I can help you explore properties in Careyes. What would you like to do?',true,{qr:tx('opts')});
}

// Auto-open
setTimeout(()=>tog(true),2500);

console.log('PLV Real Estate Assistant v1.0 · wdstudio.agency');
</script>
